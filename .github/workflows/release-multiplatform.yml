name: Multiplatform Native Installers

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-installers:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact-name: MatchingEngine-Linux.tar.gz
          - os: windows-latest
            artifact-name: MatchingEngine-Windows.zip
          - os: macos-latest
            artifact-name: MatchingEngine-Mac.tar.gz

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Solución definitiva: Modifica el pom.xml al vuelo para que jpackage reciba "1.0.0" puro
    - name: Remove SNAPSHOT version for Windows/Mac compatibility
      shell: bash
      run: |
        sed -i.bak 's/1.0-SNAPSHOT/1.0.0/g' pom.xml && rm -f pom.xml.bak

    # Bloque de construcción UNIFICADO
    - name: Build native installer (jlink + jpackage)
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          ./mvnw.cmd clean compile javafx:jlink jpackage:jpackage
        else
          chmod +x mvnw
          ./mvnw clean compile javafx:jlink jpackage:jpackage
        fi

    - name: Prepare artifact
      shell: bash
      run: |
        echo "=== Verificando estructura generada por jpackage ==="
        ls -R target/installer/ 2>/dev/null || ls -R target/ 2>/dev/null | head -n 30

        # Buscamos de forma robusta la raíz de la aplicación compilada (directorio o archivo)
        # Si jpackage generó un instalador directo o una carpeta portable, lo capturamos.
        INSTALLER_PATH=$(find target/installer target -maxdepth 3 -name "MatchingEngine" -o -name "MatchingEngine.app" -o -name "*.exe" -o -name "*.msi" 2>/dev/null | head -n 1)

        # Si por alguna razón la búsqueda específica falla, usamos la carpeta base del instalador
        if [ -z "$INSTALLER_PATH" ]; then
          if [ -d "target/installer" ]; then
            INSTALLER_PATH="target/installer"
          else
            echo "ERROR: No se encontró la salida de jpackage en target/"
            exit 1
          fi
        fi

        echo "Elemento a empaquetar encontrado en: $INSTALLER_PATH"

        # Comprimimos según la plataforma utilizando el nombre exacto definido en la matriz
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          # Usamos 7z para crear un archivo .zip limpio en Windows
          7z a "${{ matrix.artifact-name }}" "./$INSTALLER_PATH"
        else
          # Usamos tar para Linux y Mac para preservar los permisos de ejecución del binario
          tar -czf "${{ matrix.artifact-name }}" "./$INSTALLER_PATH"
        fi

        # Validación final de existencia del comprimido
        if [ ! -f "${{ matrix.artifact-name }}" ]; then
          echo "ERROR: Falló la creación del artefacto comprimido: ${{ matrix.artifact-name }}"
          exit 1
        fi
        echo "¡Artefacto creado con éxito!: ${{ matrix.artifact-name }}"

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.artifact-name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
