name: Multiplatform Native Installers

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-installers:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact-name: MatchingEngine-Linux.tar.gz
          - os: windows-latest
            artifact-name: MatchingEngine-Windows.zip
          - os: macos-latest
            artifact-name: MatchingEngine-Mac.tar.gz

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Solución definitiva: Modifica el pom.xml al vuelo para que jpackage reciba "1.0.0" puro
    - name: Remove SNAPSHOT version for Windows/Mac compatibility
      shell: bash
      run: |
        sed -i.bak 's/1.0-SNAPSHOT/1.0.0/g' pom.xml && rm -f pom.xml.bak

    # Bloque de construcción UNIFICADO
    - name: Build native installer (jlink + jpackage)
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          ./mvnw.cmd clean compile javafx:jlink jpackage:jpackage
        else
          chmod +x mvnw
          ./mvnw clean compile javafx:jlink jpackage:jpackage
        fi

    - name: Prepare artifact
      shell: bash
      run: |
        # List contents of target directory for debugging
        echo "Contents of target directory:"
        ls -laR target/ | head -100
        
        # For jpackage output, look in target/installer or where the actual installers are created
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          # Find .exe or .msi files
          INSTALLER=$(find target -type f \( -name "*.exe" -o -name "*.msi" \) | head -n 1)
          if [ -n "$INSTALLER" ]; then
            7z a ${{ matrix.artifact-name }} "$INSTALLER"
          else
            echo "ERROR: No Windows installer found"
            exit 1
          fi
        else
          # For Linux/Mac, look for the actual package output
          INSTALLER=$(find target -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.pkg" -o -name "*.dmg" \) | head -n 1)
          if [ -n "$INSTALLER" ]; then
            tar -czf ${{ matrix.artifact-name }} "$INSTALLER"
          else
            echo "ERROR: No Linux/Mac installer found"
            exit 1
          fi
        fi

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.artifact-name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
