name: Multiplatform Native Installers

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-installers:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact-name: MatchingEngine-Linux.tar.gz
          - os: windows-latest
            artifact-name: MatchingEngine-Windows.zip
          - os: macos-latest
            artifact-name: MatchingEngine-Mac.tar.gz

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Solución definitiva: Modifica el pom.xml al vuelo para que jpackage reciba "1.0.0" puro
    - name: Remove SNAPSHOT version for Windows/Mac compatibility
      shell: bash
      run: |
        sed -i.bak 's/1.0-SNAPSHOT/1.0.0/g' pom.xml && rm -f pom.xml.bak

    # Bloque de construcción UNIFICADO
    - name: Build native installer (jlink + jpackage)
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          ./mvnw.cmd clean compile javafx:jlink jpackage:jpackage
        else
          chmod +x mvnw
          ./mvnw clean compile javafx:jlink jpackage:jpackage
        fi

    - name: Prepare artifact
      shell: bash
      run: |
        echo "=== Estructura detectada en target/ ==="
        ls -la target/ 2>/dev/null || echo "target/ no existe"
        ls -la target/installer/ 2>/dev/null || echo "target/installer/ no existe"

        # Definimos la ruta base donde el plugin deposita la salida de jpackage
        OUTPUT_DIR="target/installer"

        # Si por alguna razón la carpeta target/installer no existe, buscamos dónde está la app
        if [ ! -d "$OUTPUT_DIR" ]; then
          echo "Advertencia: $OUTPUT_DIR no existe. Buscando directorio alternativo..."
          DETECTED=$(find target -maxdepth 3 -type d -name "MatchingEngine" -o -name "MatchingEngine.app" 2>/dev/null | head -n 1)
          if [ -n "$DETECTED" ]; then
            OUTPUT_DIR="$DETECTED"
          else
            echo "ERROR: No se encontró ninguna salida válida de jpackage en target/"
            exit 1
          fi
        fi

        echo "Elemento listo para empaquetar encontrado en: $OUTPUT_DIR"

        # Comprimimos el contenido real del directorio según el sistema operativo
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          # Windows: Creamos un archivo ZIP usando 7z apuntando al directorio
          7z a "${{ matrix.artifact-name }}" "./$OUTPUT_DIR"
        else
          # Linux y Mac: Usamos TAR para preservar intactos los permisos de ejecución nativos (chmod +x internos)
          tar -czf "${{ matrix.artifact-name }}" "./$OUTPUT_DIR"
        fi

        # Validación de seguridad
        if [ ! -f "${{ matrix.artifact-name }}" ]; then
          echo "ERROR: No se pudo generar el archivo comprimido final: ${{ matrix.artifact-name }}"
          exit 1
        fi
        echo "¡Éxito! Artefacto empaquetado correctamente: ${{ matrix.artifact-name }}"

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.artifact-name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
