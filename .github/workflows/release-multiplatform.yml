name: Multiplatform Native Installers

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-installers:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact-name: MatchingEngine-Linux.tar.gz
          - os: windows-latest
            artifact-name: MatchingEngine-Windows.zip
          - os: macos-latest
            artifact-name: MatchingEngine-Mac.tar.gz

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Solución definitiva: Modifica el pom.xml al vuelo para que jpackage reciba "1.0.0" puro
    - name: Remove SNAPSHOT version for Windows/Mac compatibility
      shell: bash
      run: |
        sed -i.bak 's/1.0-SNAPSHOT/1.0.0/g' pom.xml && rm -f pom.xml.bak

    # Bloque de construcción UNIFICADO
    - name: Build native installer (jlink + jpackage)
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          ./mvnw.cmd clean compile javafx:jlink jpackage:jpackage
        else
          chmod +x mvnw
          ./mvnw clean compile javafx:jlink jpackage:jpackage
        fi

    - name: Prepare artifact
      shell: bash
      run: |
        # Buscamos de forma recursiva la carpeta "MatchingEngine" dentro de target/
        TARGET_DIR=$(find target -type d -name "MatchingEngine" | head -n 1)
        
        if [ -z "$TARGET_DIR" ]; then
          TARGET_DIR="target/installer/MatchingEngine"
        fi
        
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          7z a ${{ matrix.artifact-name }} ./${TARGET_DIR}
        else
          tar -czf ${{ matrix.artifact-name }} ./${TARGET_DIR}
        fi

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.artifact-name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
