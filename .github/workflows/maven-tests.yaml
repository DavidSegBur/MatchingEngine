name: Java CI with Maven and JUnit 5

# Define qué eventos van a disparar este circuito de pruebas
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # Corre sobre la última versión estable de Ubuntu Linux
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código del repositorio en la máquina virtual
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. Configura el entorno de Java (JDK) en la máquina
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # Guarda en caché las dependencias para que corra más rápido en los próximos commits

    # 3. El paso clave: Ejecuta los tests de JUnit 5 con Maven
    - name: Run JUnit 5 Tests with Maven
      run: ./mvnw clean test
